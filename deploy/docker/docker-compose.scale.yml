# 三期扩展：8 微服务节点 + 对应 Agent（与 docker-compose.yml 叠加使用）
# 用法：docker compose -f docker-compose.yml -f docker-compose.wsl.yml -f docker-compose.scale.yml up -d

version: '3.8'

services:
  service-3:
    image: kennethreitz/httpbin:latest
    container_name: service-3
    networks:
      - lognet

  service-3-agent:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.agent
    container_name: service-3-agent
    environment:
      - AGENT_CONFIG_PATH=/etc/agent/agent.yaml
    volumes:
      - ./agents/service-3-agent.yaml:/etc/agent/agent.yaml
    depends_on:
      - center
    network_mode: "service:service-3"

