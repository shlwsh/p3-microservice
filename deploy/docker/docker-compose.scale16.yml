# 自动生成：16 微服务节点（叠加 docker-compose.yml 使用）
# 生成：python3 experiments/scripts/generate_scale_compose.py --nodes 16
version: '3.8'

services:
  service-3:
    image: kennethreitz/httpbin:latest
    container_name: service-3
    networks:
      - lognet

  service-3-agent:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.agent
    container_name: service-3-agent
    environment:
      - AGENT_CONFIG_PATH=/etc/agent/agent.yaml
    volumes:
      - ./agents/service-3-agent.yaml:/etc/agent/agent.yaml
    depends_on:
      - center
    network_mode: "service:service-3"

