# Nginx 配置 - 网关节点
# 支持 OpenResty Lua 流量日志采集

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ============================================================
    # 共享内存区（Lua 流量日志缓存）
    # ============================================================
    lua_shared_dict log_buffer 32m;

    # Lua 包路径
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # ============================================================
    # 上游微服务
    # ============================================================
    upstream service_1 {
        server service-1:80;
    }

    upstream service_2 {
        server service-2:80;
    }

    # ============================================================
    # 网关服务器
    # ============================================================
    server {
        listen 80;
        server_name _;

        # 健康检查
        location /health {
            return 200 '{"status":"ok","component":"gateway"}';
            add_header Content-Type application/json;
        }

        # 服务路由
        location /api/service1/ {
            proxy_pass http://service_1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 流量日志采集
            log_by_lua_file /usr/local/openresty/nginx/lua/log_capture.lua;
        }

        location /api/service2/ {
            proxy_pass http://service_2/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 流量日志采集
            log_by_lua_file /usr/local/openresty/nginx/lua/log_capture.lua;
        }

        # 默认路由
        location / {
            return 404 '{"error":"not_found"}';
            add_header Content-Type application/json;
        }
    }
}
