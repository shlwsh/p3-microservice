        # Nginx 配置 - 网关节点（16 服务路由，自动生成）
        worker_processes auto;
        error_log /dev/stderr warn;

        events {
            worker_connections 4096;
            use epoll;
            multi_accept on;
        }

        http {
            include       mime.types;
            default_type  application/octet-stream;

            log_format main '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'rt=$request_time uct=$upstream_connect_time '
                            'urt=$upstream_response_time';

            access_log /dev/stdout main;
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;
            keepalive_timeout 65;

            lua_shared_dict log_buffer 32m;
            lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

            upstream service_1 {
        server service-1:80;
    }
    upstream service_2 {
        server service-2:80;
    }
    upstream service_3 {
        server service-3:80;
    }
    upstream service_4 {
        server service-4:80;
    }
    upstream service_5 {
        server service-5:80;
    }
    upstream service_6 {
        server service-6:80;
    }
    upstream service_7 {
        server service-7:80;
    }
    upstream service_8 {
        server service-8:80;
    }
    upstream service_9 {
        server service-9:80;
    }
    upstream service_10 {
        server service-10:80;
    }
    upstream service_11 {
        server service-11:80;
    }
    upstream service_12 {
        server service-12:80;
    }
    upstream service_13 {
        server service-13:80;
    }
    upstream service_14 {
        server service-14:80;
    }
    upstream service_15 {
        server service-15:80;
    }
    upstream service_16 {
        server service-16:80;
    }

            server {
                listen 80;
                server_name _;

                location = /_agent/logs {
                    allow 127.0.0.1;
                    deny all;
                    content_by_lua_file /usr/local/openresty/nginx/lua/log_pull.lua;
                }

                location /health {
                    return 200 '{"status":"ok","component":"gateway"}';
                    add_header Content-Type application/json;
                }

        location /api/service1/ {
    proxy_pass http://service_1/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    log_by_lua_file /usr/local/openresty/nginx/lua/log_capture.lua;
}
